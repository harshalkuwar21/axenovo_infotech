<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Website Under Maintenance | Axenovo Infotech</title>
    <link rel="icon" type="image/png" href="/assets/brand/axenovo-infotech-logo.png" />
    <style>
      :root {
        color-scheme: light;
        --bg-top: #eef5ff;
        --bg-bottom: #dfeafc;
        --card-bg: rgba(255, 255, 255, 0.92);
        --card-border: rgba(16, 34, 71, 0.08);
        --heading: #102247;
        --body: #4d6289;
        --accent: #1771e6;
        --accent-soft: rgba(23, 113, 230, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(23, 113, 230, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(27, 198, 212, 0.18), transparent 22%),
          linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
        color: var(--heading);
      }

      .maintenance-shell {
        width: min(680px, 100%);
        padding: 2rem;
        border-radius: 28px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        box-shadow: 0 24px 60px rgba(16, 34, 71, 0.12);
        text-align: center;
      }

      .maintenance-logo {
        width: 120px;
        max-width: 100%;
        display: block;
        margin: 0 auto 1.25rem;
      }

      .maintenance-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.55rem 0.9rem;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.84rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 1.25rem 0 0.85rem;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.08;
      }

      p {
        margin: 0;
        color: var(--body);
        font-size: 1.02rem;
        line-height: 1.7;
      }

      .maintenance-note {
        margin-top: 1.25rem;
        padding: 1rem 1.1rem;
        border-radius: 18px;
        background: rgba(23, 113, 230, 0.05);
        border: 1px solid rgba(23, 113, 230, 0.1);
      }

      .maintenance-note strong {
        display: block;
        margin-bottom: 0.3rem;
        color: var(--heading);
      }

      @media (max-width: 640px) {
        .maintenance-shell {
          padding: 1.5rem;
          border-radius: 24px;
        }

        .maintenance-logo {
          width: 96px;
        }
      }
    </style>
  </head>
  <body>
    <main class="maintenance-shell">
      <img
        class="maintenance-logo"
        src="/assets/brand/axenovo-infotech-logo.png"
        alt="Axenovo Infotech logo"
      />
      <span class="maintenance-pill">Maintenance Mode</span>
      <h1>We will be back soon.</h1>
      <p th:text="${maintenanceNotice ?: maintenanceMessage}">
        Our website is currently under maintenance. Please check again after some time.
      </p>
      <div class="maintenance-note">
        <strong>Thanks for your patience</strong>
        <p>We are making updates to improve the website experience.</p>
      </div>
    </main>
  </body>
</html>
